# Application Name
spring.application.name=LibraryManagementSystem

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/libraryManagementSystem
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:your_password_here}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update


# JWT Configuration
jwt.secret=${JWT_SECRET:your_secret_key}
jwt.expiration=86400000

# Swagger Configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# Email Settings
app.email.from=LibrarySystem <your-email@gmail.com>
app.email.enabled=true

# Profile
spring.profiles.active=dev

